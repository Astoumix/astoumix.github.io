<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collection de Jeux Indés</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #333;
            padding-bottom: 20px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #a855f7;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-top: 20px;
            font-size: 1.1em;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .stat-count {
            font-weight: bold;
            color: #a855f7;
            font-size: 1.3em;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }

        .control-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        label {
            font-weight: bold;
            color: #888;
        }

        select, button {
            padding: 10px 15px;
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.2s ease;
        }

        select:hover, button:hover {
            border-color: #a855f7;
            background: #333;
        }

        select:focus, button:focus {
            outline: none;
            border-color: #a855f7;
            box-shadow: 0 0 8px rgba(168, 85, 247, 0.3);
        }

        button.active {
            background: #a855f7;
            border-color: #a855f7;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: #2a2a2a;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.2s ease;
            border: 3px solid #444;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        .card-image {
            width: 100%;
            height: 180px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            color: #444;
            overflow: hidden;
            position: relative;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 10px;
        }

        .card-info {
            padding: 12px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .card-name {
            font-weight: bold;
            font-size: 0.95em;
            margin-bottom: 6px;
            line-height: 1.2;
            color: #fff;
        }

        .card-year {
            font-size: 0.85em;
            color: #888;
            margin-bottom: 4px;
        }

        .card-rarity {
            font-size: 0.8em;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 3px;
            text-align: center;
            margin-top: auto;
        }

        .card.commun { border-color: #9ca3af; }
        .card.commun .card-rarity { background: #9ca3af; color: #000; }
        
        .card.peucommun { border-color: #4ade80; }
        .card.peucommun .card-rarity { background: #4ade80; color: #000; }
        
        .card.rare { border-color: #60a5fa; }
        .card.rare .card-rarity { background: #60a5fa; color: #000; }
        
        .card.epique { border-color: #a855f7; }
        .card.epique .card-rarity { background: #a855f7; color: #fff; }
        
        .card.legendaire { border-color: #fbbf24; }
        .card.legendaire .card-rarity { background: #fbbf24; color: #000; }

        .card.goty {
            border-color: #f43f5e;
            box-shadow: 0 0 15px rgba(244, 63, 94, 0.3);
        }
        .card.goty .card-rarity {
            background: #f43f5e;
            color: #fff;
        }

        .empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="title">Collection de astoumix</h1>
            <div class="stats">
                <div class="stat-item">

        <div class="gallery" id="gallery"></div>

e",year:2019,rarity:"Commun"},150:{name:"Nuclear Throne",year:2015,rarity:"Peu commun"},151:{name:"Everhood",year:2021,rarity:"Commun"},152:{name:"Airships: Conquer the Skies",year:2018,rarity:"Commun"},153:{name:"Enter the Gungeon",year:2016,rarity:"Epique"},154:{name:"Hidden Folks",year:2017,rarity:"Commun"},155:{name:"This War of Mine",year:2014,rarity:"Epique"},156:{name:"WorldBox",year:2021,rarity:"Commun"},157:{name:"The Henry Stickmin Collection",year:2020,rarity:"Commun"},158:{name:"Airborne Kingdom",year:2020,rarity:"Commun"},159:{name:"20 Minutes Till Dawn",year:2023,rarity:"Peu commun"}};
        const RARITY_ORDER = {"Commun":0,"Peu commun":1,"Rare":2,"Epique":3,"Légendaire":4};
        let collection = {};
        let currentFilter = "all";
        let currentSort = "name";

        function getRarityClass(rarity) {
            const map = {"Commun":"commun","Peu commun":"peucommun","Rare":"rare","Epique":"epique","Légendaire":"legendaire"};
            return map[rarity] || "commun";
        }

        function getUsername() {
            const parts = window.location.pathname.split('/').filter(p => p);
            return parts[parts.length - 1] || "astoumix";
        }

        async function loadCollection() {
            const username = getUsername();
            document.getElementById("title").textContent = `Collection de ${username}`;
            
            async function fetchCollection() {
                try {
                    const response = await fetch(
                        `https://ygqtbfwolcbcaxmldhta.supabase.co/rest/v1/collections?username=eq.${username}`,
                        {
                            headers: {
                                'apikey': 'sb_publishable_31KEJFCIQEFXF-1UQE586g_gX6R'
                            }
                        }
                    );
                    
                    const data = await response.json();
                    
                    if (data.length > 0) {
                        collection = {};
                        data.forEach(item => {
                            if (item.is_goty) {
                                collection[-item.game_id] = item.quantity;
                            } else {
                                collection[item.game_id] = item.quantity;
                            }
                        });
                    }
                    
                    render();
                } catch (error) {
                    console.log('Loading collection...');
                }
            }
            
            await fetchCollection();
            setInterval(fetchCollection, 2000);
        }

        function render() {
            const gallery = document.getElementById("gallery");
            const classicCount = Object.keys(collection).filter(k => k > 0).length;
            const gotyCount = Object.keys(collection).filter(k => k < 0 && collection[k] > 0).length;
            document.getElementById("count-classic").textContent = classicCount;
            document.getElementById("count-goty").textContent = gotyCount;

            let games = [];
            Object.keys(collection).forEach(key => {
                if (collection[key] > 0) {
                    const gameId = Math.abs(parseInt(key));
                    const isGoty = key < 0;
                    games.push({id: gameId, ...GAMES[gameId], isGoty});
                }
            });

            if (currentFilter === "classic") games = games.filter(g => !g.isGoty);
            if (currentFilter === "goty") games = games.filter(g => g.isGoty);
            if (currentSort === "name") games.sort((a, b) => a.name.localeCompare(b.name));
            if (currentSort === "year") games.sort((a, b) => b.year - a.year);
            if (currentSort === "rarity") games.sort((a, b) => RARITY_ORDER[b.rarity] - RARITY_ORDER[a.rarity]);

            gallery.innerHTML = games.length === 0 
                ? '<div class="empty">Aucun jeu dans cette collection pour l\'instant</div>'
                : games.map(g => {
                    const rarityClass = getRarityClass(g.rarity);
                    const cardClass = g.isGoty ? "goty" : rarityClass;
                    return `<div class="card ${cardClass}"><div class="card-image"><img src="GamesImg/mockup${g.isGoty ? "/GOTY" : ""}/${g.id}.png" alt="${g.name}" onerror="this.style.display='none'"></div><div class="card-info"><div class="card-name">${g.name}</div><div class="card-year">${g.year}</div><div class="card-rarity">${g.isGoty ? "GOTY" : g.rarity}</div></div></div>`;
                }).join('');
        }

        document.getElementById("filter-all").addEventListener("click", function() {
            currentFilter = "all";
            document.querySelectorAll(".controls button").forEach(b => b.classList.remove("active"));
            this.classList.add("active");
            render();
        });

        document.getElementById("filter-classic").addEventListener("click", function() {
            currentFilter = "classic";
            document.querySelectorAll(".controls button").forEach(b => b.classList.remove("active"));
            this.classList.add("active");
            render();
        });

        document.getElementById("filter-goty").addEventListener("click", function() {
            currentFilter = "goty";
            document.querySelectorAll(".controls button").forEach(b => b.classList.remove("active"));
            this.classList.add("active");
            render();
        });

        document.getElementById("sort-select").addEventListener("change", function() {
            currentSort = this.value;
            render();
        });

        loadCollection();
    </script>
